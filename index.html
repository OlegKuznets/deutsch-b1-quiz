":["sowohl ... als auch","weder ... noch","zwar ... aber","entweder ... oder"],"correct_index":1,"explanation":"'Weder ... noch' = keines: nicht gelesen und nicht zurückgegeben."},{"id":251,"category":"Vokabeln","text":"Der Vorstand hat eine wichtige ___ getroffen.","options":["Entscheidung","Entschluss","Bescheid","Erklärung"],"correct_index":0,"explanation":"Nomen-Verb-Verbindung: 'eine Entscheidung treffen' = sich entscheiden."},{"id":252,"category":"Vokabeln","text":"Bitte ___ Sie den Hörer nicht auf, ich verbinde Sie weiter.","options":["legen","stellen","setzen","hängen"],"correct_index":0,"explanation":"'Den Hörer auflegen' = das Telefonat beenden. Hier: Bitte nicht auflegen."},{"id":253,"category":"Vokabeln","text":"Welches Wort passt? 'Das ___ Wasser darf nicht berührt werden.'","options":["kochende","gekochte","kochte","kochen"],"correct_index":0,"explanation":"Partizip I als Adjektiv: 'kochend' = Wasser, das gerade kocht (aktiv, gleichzeitig)."},{"id":254,"category":"Vokabeln","text":"Ich ___ ihn seit der Schulzeit, aber ich ___ nicht, wo er jetzt wohnt.","options":["kenne / weiß","weiß / kenne","kenne / kenne","weiß / weiß"],"correct_index":0,"explanation":"'Kennen' = vertraut sein mit einer Person. 'Wissen' = eine Information haben."},{"id":255,"category":"Vokabeln","text":"Der Projektleiter muss noch ___ zum Zeitplan nehmen.","options":["Stellung","Platz","Stelle","Stand"],"correct_index":0,"explanation":"Nomen-Verb-Verbindung: 'Stellung nehmen zu' = sich offiziell äußern."},{"id":256,"category":"Vokabeln","text":"Wie beendet man eine formelle E-Mail auf Deutsch?","options":["Mit freundlichen Grüßen","Tschüss","Bis dann","Mach's gut"],"correct_index":0,"explanation":"'Mit freundlichen Grüßen' ist die Standardschlussformel formeller E-Mails."},{"id":257,"category":"Vokabeln","text":"Welches Wort passt? 'Die ___ Tür ließ kalte Luft herein.'","options":["geöffnete","öffnende","öffnete","geöffnet"],"correct_index":0,"explanation":"Partizip II als Adjektiv: 'geöffnet' = die Tür ist bereits offen (Zustand/Resultat)."},{"id":258,"category":"Vokabeln","text":"___ das Buch bitte auf den Tisch. Es soll dort ___.","options":["Leg / liegen","Lieg / legen","Stell / stehen","Leg / legen"],"correct_index":0,"explanation":"'Legen' (transitiv, Akk.) = in horizontale Position bringen. 'Liegen' (intransitiv) = sich dort befinden."},{"id":259,"category":"Vokabeln","text":"Die Firma hat einen neuen Vertrag ___ Abschluss gebracht.","options":["zum","zur","in","auf"],"correct_index":0,"explanation":"Nomen-Verb-Verbindung: 'zum Abschluss bringen' = abschließen, beenden."},{"id":260,"category":"Vokabeln","text":"Welcher Satz ist korrekt für einen geschäftlichen Anruf?","options":["Guten Tag, hier spricht Müller von der Firma XY.","Hey, ich bin's, der Müller.","Ja hallo, was gibt's?","Wer ist da?"],"correct_index":0,"explanation":"Formelle Telefonmeldung: Begrüßung + Name + Firma."},{"id":261,"category":"Vokabeln","text":"Ein ___ Passagier wurde ins Krankenhaus gebracht.","options":["verletzter","verletzender","verletzte","verletzten"],"correct_index":0,"explanation":"Partizip II als Adjektiv, starke Dekl. Nom. Mask. ohne Artikel: verletzter Passagier."},{"id":262,"category":"Vokabeln","text":"Meine Schwester ___ Medizin in München. Mein Bruder ___ gerade für seinen Führerschein.","options":["studiert / lernt","lernt / studiert","studiert / studiert","lernt / lernt"],"correct_index":0,"explanation":"'Studieren' = an einer Hochschule. 'Lernen' = sich Wissen/Fähigkeiten aneignen (allgemein)."},{"id":263,"category":"Vokabeln","text":"Der Minister hat eine ___ abgegeben.","options":["Erklärung","Erkundigung","Erfahrung","Erlaubnis"],"correct_index":0,"explanation":"Nomen-Verb-Verbindung: 'eine Erklärung abgeben' = offiziell etwas erklären."},{"id":264,"category":"Vokabeln","text":"Welche Formulierung passt in eine formelle E-Mail? 'Ich schreibe Ihnen ___ Ihrer Stellenanzeige.'","options":["bezüglich","weil","trotzdem","obwohl"],"correct_index":0,"explanation":"'Bezüglich' + Gen. = formelle Angabe des Betreffs. Typisch für Geschäftskorrespondenz."},{"id":265,"category":"Vokabeln","text":"Das ___ Kind schlief friedlich im Arm der Mutter.","options":["schlafende","geschlafene","schlafene","schlafendes"],"correct_index":0,"explanation":"Partizip I als Adjektiv, schwache Dekl. Nom. Neutr. nach 'das': das schlafende Kind."},{"id":266,"category":"Vokabeln","text":"___ die Flasche bitte in den Kühlschrank. Sie soll dort ___.","options":["Stell / stehen","Steh / stellen","Leg / liegen","Setz / sitzen"],"correct_index":0,"explanation":"'Stellen' (transitiv, Akk.) = vertikal platzieren. 'Stehen' (intransitiv) = sich dort befinden."},{"id":267,"category":"Vokabeln","text":"Der Chef hat den Plan in ___ gestellt.","options":["Frage","Antwort","Rede","Wort"],"correct_index":0,"explanation":"Nomen-Verb-Verbindung: 'in Frage stellen' = bezweifeln, anzweifeln."},{"id":268,"category":"Vokabeln","text":"Was sagt man am Telefon, wenn man jemanden weiterverbinden möchte?","options":["Einen Moment bitte, ich verbinde Sie.","Warten Sie mal kurz, ich guck nach.","Keine Ahnung, rufen Sie nochmal an.","Der ist gerade nicht da, tschüss."],"correct_index":0,"explanation":"'Einen Moment bitte, ich verbinde Sie' ist die professionelle Formulierung beim Weiterverbinden."},{"id":269,"category":"Vokabeln","text":"Welches Wort passt? 'Der frisch ___ Kuchen duftet herrlich.'","options":["gebackene","backende","gebacken","backte"],"correct_index":0,"explanation":"Partizip II als Adjektiv: 'gebacken' = Kuchen ist fertig (Resultat). Schwache Dekl. nach 'der'."},{"id":270,"category":"Vokabeln","text":"Er hat mich in dem Meeting nicht ___. Dabei habe ich ihn gut ___.","options":["erkannt / gekannt","gekannt / erkannt","gewusst / gekannt","erkannt / gewusst"],"correct_index":0,"explanation":"'Erkennen' = wiedererkennen (visuell). 'Kennen' = mit jemandem vertraut sein."},{"id":271,"category":"Vokabeln","text":"Die Abteilungsleiterin hat ___ dara ":278,"category":"Vokabeln","text":"Ich ___ nicht, ob das stimmt. Aber ich ___ einen Experten, den ich fragen kann.","options":["weiß / kenne","kenne / weiß","weiß / weiß","kenne / kenne"],"correct_index":0,"explanation":"'Wissen' = Faktenwissen haben. 'Kennen' = mit einer Person vertraut sein."},{"id":279,"category":"Vokabeln","text":"Die Regierung hat Maßnahmen zur Bekämpfung der Inflation ___.","options":["ergriffen","gestellt","genommen","gebracht"],"correct_index":0,"explanation":"Nomen-Verb-Verbindung: 'Maßnahmen ergreifen' = Maßnahmen einleiten/umsetzen."},{"id":280,"category":"Vokabeln","text":"Was bedeutet 'Ich bin leider gerade nicht erreichbar. Bitte hinterlassen Sie eine Nachricht.'?","options":["Eine Mailbox-Ansage / Anrufbeantworter","Eine SMS-Antwort","Eine automatische E-Mail","Ein Chat-Status"],"correct_index":0,"explanation":"Typische Ansage auf dem Anrufbeantworter (Mailbox): nicht erreichbar + Nachricht hinterlassen."},{"id":281,"category":"Vokabeln","text":"Er reparierte das Auto mit ___ Werkzeug. (= das Werkzeug fehlte teilweise)","options":["fehlendem","gefehlendem","gefehlt","fehlende"],"correct_index":0,"explanation":"Partizip I als Adjektiv, starke Dekl. Dat. Neutr. ohne Artikel: mit fehlendem Werkzeug."},{"id":282,"category":"Vokabeln","text":"Das Kind ___ auf dem Stuhl. Die Mutter hat es dorthin ___.","options":["sitzt / gesetzt","setzt / gesessen","sitzt / gesitzen","setzt / gesetzt"],"correct_index":0,"explanation":"'Sitzen' (intransitiv) = Zustand. 'Setzen' (transitiv, Akk.) = in Sitzposition bringen."},{"id":283,"category":"Vokabeln","text":"Der Anwalt hat ___ gegen das Urteil eingelegt.","options":["Berufung","Rechnung","Bewerbung","Bestellung"],"correct_index":0,"explanation":"Nomen-Verb-Verbindung: 'Berufung einlegen' = juristisch gegen ein Urteil vorgehen."},{"id":284,"category":"Vokabeln","text":"Welche Anrede ist korrekt für eine formelle E-Mail an eine unbekannte Person?","options":["Sehr geehrte Damen und Herren,","Hallo zusammen,","Liebe Grüße,","Hi,"],"correct_index":0,"explanation":"'Sehr geehrte Damen und Herren' = formelle Standardanrede bei unbekanntem Empfänger."},{"id":285,"category":"Vokabeln","text":"Das ist ein gut ___ Argument.","options":["durchdachtes","durchdenkendes","durchgedachtes","durchdachte"],"correct_index":0,"explanation":"Partizip II als Adjektiv, gemischte Dekl. Nom. Neutr. nach 'ein': ein durchdachtes Argument."},{"id":286,"category":"Vokabeln","text":"Er ___ an der Universität Hamburg. Er ___ jeden Abend für die Klausuren.","options":["studiert / lernt","lernt / studiert","studiert / studiert","lernt / lernt"],"correct_index":0,"explanation":"'Studieren' = immatrikuliert an einer Hochschule sein. 'Lernen' = Stoff wiederholen/einprägen."},{"id":287,"category":"Vokabeln","text":"Die Verhandlungen haben zu einem Ergebnis ___.","options":["geführt","gebracht","gestellt","getroffen"],"correct_index":0,"explanation":"Nomen-Verb-Verbindung: 'zu einem Ergebnis führen' = ein Ergebnis hervorbringen."},{"id":288,"category":"Vokabeln","text":"Welcher Satz passt in eine E-Mail-Erinnerung? 'Ich erlaube mir, Sie an ___ vom 5. Mai zu erinnern.'","options":["unser Gespräch","unseres Gespräch","unserem Gespräch","unseren Gespräch"],"correct_index":0,"explanation":"'Erinnern an' + Akk. → 'an unser Gespräch' (Neutr. Akk.)."},{"id":289,"category":"Vokabeln","text":"Die ___ Nachbarn beschwerten sich über den Lärm.","options":["genervten","nervenden","genervte","nervende"],"correct_index":0,"explanation":"Partizip II als Adjektiv: 'genervt' = die Nachbarn sind genervt (Zustand). Schwache Dekl. Nom. Pl."},{"id":290,"category":"Vokabeln","text":"Wo ___ die Lampe? — Ich habe sie auf den Schreibtisch ___.","options":["steht / gestellt","stellt / gestanden","liegt / gelegt","steht / gestanden"],"correct_index":0,"explanation":"'Stehen' (intransitiv) = vertikale Position. 'Stellen' (transitiv) = vertikal platzieren."},{"id":291,"category":"Vokabeln","text":"Der Redner hat eine lange ___ gehalten.","options":["Rede","Sprache","Stimme","Aussage"],"correct_index":0,"explanation":"Nomen-Verb-Verbindung: 'eine Rede halten' = vor Publikum sprechen."},{"id":292,"category":"Leseverstehen","text":"'Bitte bestätigen Sie den Termin bis spätestens Freitag, 12:00 Uhr. Andernfalls wird der Termin automatisch storniert.' — Was passiert, wenn man nicht antwortet?","options":["Der Termin wird verschoben.","Der Termin wird abgesagt.","Man bekommt eine Erinnerung.","Der Termin wird bestätigt."],"correct_index":1,"explanation":"'Automatisch storniert' = bei Nichtbestätigung wird der Termin abgesagt."},{"id":293,"category":"Vokabeln","text":"Der ___ Motor verursachte den Unfall.","options":["überhitzte","überhitzende","überhitzen","überhitzter"],"correct_index":0,"explanation":"Partizip II als Adjektiv, schwache Dekl. Nom. Mask. nach 'der': der überhitzte Motor."},{"id":294,"category":"Vokabeln","text":"Viele Lerner verwechseln: 'Ich ___ das Buch gut' (= es gefällt mir) vs. 'Ich ___ das Buch gut' (= Inhalt ist mir bekannt).","options":["finde / kenne","kenne / finde","weiß / kenne","kenne / weiß"],"correct_index":0,"explanation":"'Finden' + Adj. = bewerten/einschätzen. 'Kennen' = vertraut sein mit dem Inhalt."},{"id":295,"category":"Vokabeln","text":"Er hat den Antrag auf Förderung ___.","options":["gestellt","gemacht","gegeben","gelegt"],"correct_index":0,"explanation":"Nomen-Verb-Verbindung: 'einen Antrag stellen' = offiziell etwas beantragen."},{"id":296,"category":"Vokabeln","text":"Welche Formulierung ist für eine E-Mail-Bitte angemessen?","options":["Wären Sie so freundlich, mir die Unterlagen zuzusenden?","Schick mir mal die Unterlagen.","Ich brauche die Unterlagen sofort.","Gib mir die Unterlagen."],"correct_index":0,"explanation":"'Wären Sie so freundlich' = höfliche Konjunktiv-II-Formulierung für formelle Bitten."},{"id":297,"category":"Vokabeln","text":"Die ___ Kosten überraschten alle Beteiligten.","options":["steigenden","gestiegenen","steigende","gestiegene"],"correct_index":0,"explanation":"Partizip I als Adjektiv, schwache Dekl. Nom. Pl. nach 'die': die steigenden Kosten (= Kosten steigen gerade)."},{"id":298,"category":"Vokabeln","text":"Ich habe den Schlüssel auf das Regal ___. Jetzt ___ er dort oben.","options":["gelegt / liegt","gelegen / legt","gelegt / legt","gelegen / liegt"],"correct_index":0,"explanation":"'Legen' (Perfekt: gelegt) = platzieren. 'Liegen' = sich dort befinden (Zustand)."},{"id":299,"category":"Vokabeln","text":"Die Gewerkschaft hat ___ gegen die Kürzungen erhoben.","options":["Einspruch","Anspruch","Ausspruch","Zuspruch"],"correct_index":0,"explanation":"Nomen-Verb-Verbindung: 'Einspruch erheben' = offiziell Widerspruch einlegen."},{"id":300,"category":"Leseverstehen","text":"'Im Anhang finden Sie das unterzeichnete Protokoll der letzten Sitzung. Bitte leiten Sie es an die betreffenden Kollegen weiter.' — Was wird erwartet?","options":["Das Protokoll soll an bestimmte Kollegen weitergegeben werden.","Das Protokoll soll gelöscht werden.","Das Protokoll soll neu geschrieben werden.","Das Protokoll soll ausgedruckt werden."],"correct_index":0,"explanation":"'Weiterleiten an die betreffenden Kollegen' = das Dokument an die relevanten Personen senden."}];

const CATS = {
  'Grammatik':    { icon:'📝', color:'rgba(99,140,255,0.15)', textColor:'#6b8cff' },
  'Vokabeln':     { icon:'📖', color:'rgba(255,165,2,0.15)', textColor:'#ffa502' },
  'Leseverstehen':{ icon:'📰', color:'rgba(46,213,115,0.15)', textColor:'#2ed573' }
};

const LETTERS = ['A','B','C','D'];

const app = {
  questions: [],
  index: 0,
  score: 0,
  selected: null,
  confirmed: false,
  records: [],

  init() {
    this.buildCatGrid();
    this.loadStats();
    if('serviceWorker' in navigator){
      navigator.serviceWorker.register('./sw.js').catch(()=>{});
    }
  },

  buildCatGrid() {
    const grid = document.getElementById('catGrid');
    const counts = {};
    ALL_QUESTIONS.forEach(q => counts[q.category] = (counts[q.category]||0) + 1);

    let html = '';
    for(const [cat, meta] of Object.entries(CATS)){
      if(!counts[cat]) continue;
      html += `<button class="cat-btn" onclick="app.start('${cat}')">
        <div class="cat-icon" style="background:${meta.color};color:${meta.textColor}">${meta.icon}</div>
        <span>${cat}</span>
        <span class="cat-count">${counts[cat]}</span>
        <span class="chevron">›</span>
      </button>`;
    }
    html += `<button class="cat-btn" onclick="app.start(null)">
      <div class="cat-icon" style="background:rgba(233,69,96,0.15);color:var(--accent)">🎯</div>
      <span>Alle Kategorien</span>
      <span class="cat-count">${ALL_QUESTIONS.length}</span>
      <span class="chevron">›</span>
    </button>`;
    grid.innerHTML = html;
  },

  start(cat) {
    let pool = cat ? ALL_QUESTIONS.filter(q => q.category === cat) : [...ALL_QUESTIONS];
    this.questions = this.shuffle(pool);
    this.index = 0;
    this.score = 0;
    this.selected = null;
    this.confirmed = false;
    this.records = [];
    this.show('quiz');
    this.render();
  },

  retryWrong() {
    const wrong = this.records.filter(r => !r.correct).map(r => r.question);
    if(!wrong.length) return;
    this.questions = this.shuffle(wrong);
    this.index = 0;
    this.score = 0;
    this.selected = null;
    this.confirmed = false;
    this.records = [];
    this.show('quiz');
    this.render();
  },

  render() {
    const q = this.questions[this.index];
    const total = this.questions.length;

    document.getElementById('qScore').textContent = this.score;
    document.getElementById('qCounter').textContent = `${this.index + 1} / ${total}`;
    document.getElementById('qProgress').style.width = `${(this.index / total) * 100}%`;

    const catEl = document.getElementById('qCat');
    catEl.textContent = q.category;
    catEl.className = 'q-category ' + q.category;

    document.getElementById('qText').textContent = q.text;

    let optsHtml = '';
    q.options.forEach((opt, i) => {
      optsHtml += `<button class="opt-btn" data-i="${i}" onclick="app.select(${i})">
        <span class="opt-letter">${LETTERS[i]}</span>
        <span class="opt-text">${opt}</span>
      </button>`;
    });
    document.getElementById('qOptions').innerHTML = optsHtml;

    document.getElementById('qExpl').classList.remove('show');
    const btn = document.getElementById('qAction');
    btn.textContent = 'Bestätigen';
    btn.disabled = true;
    this.selected = null;
    this.confirmed = false;
  },

  select(i) {
    if(this.confirmed) return;
    this.selected = i;
    document.querySelectorAll('.opt-btn').forEach((b,idx) => {
      b.classList.toggle('selected', idx === i);
    });
    document.getElementById('qAction').disabled = false;
  },

  action() {
    if(!this.confirmed) {
      this.confirm();
    } else {
      this.next();
    }
  },

  confirm() {
    if(this.selected === null) return;
    this.confirmed = true;
    const q = this.questions[this.index];
    const correct = this.selected === q.correct_index;
    if(correct) this.score++;

    this.records.push({ question:q, selectedIndex:this.selected, correct });

    document.querySelectorAll('.opt-btn').forEach((b,idx) => {
      b.classList.add('locked');
      b.classList.remove('selected');
      if(idx === q.correct_index) b.classList.add('correct');
      else if(idx === this.selected && !correct) b.classList.add('wrong');
    });

    if(!correct) {
      document.getElementById('qExplText').textContent = q.explanation;
      document.getElementById('qExpl').classList.add('show');
    }

    const btn = document.getElementById('qAction');
    btn.textContent = this.index + 1 < this.questions.length ? 'Nächste Frage' : 'Ergebnis anzeigen';
  },

  next() {
    if(this.index + 1 < this.questions.length) {
      this.index++;
      this.render();
      document.querySelector('.quiz-body').scrollTo(0, 0);
    } else {
      this.finish();
    }
  },

  finish() {
    const total = this.questions.length;
    const pct = Math.round((this.score / total) * 100);
    const wrong = this.records.filter(r => !r.correct);

    // Update stats
    this.saveStats(pct);

    // Ring animation
    const circumference = 2 * Math.PI * 80; // 502.65
    const offset = circumference - (circumference * pct / 100);
    const ring = document.getElementById('resRing');
    ring.style.stroke = pct >= 80 ? 'var(--green)' : pct >= 50 ? 'var(--yellow)' : 'var(--red)';
    setTimeout(() => ring.style.strokeDashoffset = offset, 100);

    document.getElementById('resPct').textContent = pct + '%';
    document.getElementById('resRatio').textContent = `${this.score} / ${total}`;

    let msg = 'Mehr Übung nötig.';
    if(pct >= 80) msg = 'Sehr gut! 🎉';
    else if(pct >= 50) msg = 'Gut, aber übe weiter!';
    document.getElementById('resMsg').textContent = msg;

    // Wrong list
    let wHtml = '';
    if(wrong.length) {
      wHtml = `<div class="wrong-header">Fehler (${wrong.length})</div>`;
      wrong.forEach(r => {
        const q = r.question;
        wHtml += `<div class="wrong-card">
          <div class="wc-q">${q.text}</div>
          <div class="wc-row bad">✕ <s>${q.options[r.selectedIndex]}</s></div>
          <div class="wc-row good">✓ ${q.options[q.correct_index]}</div>
          <div class="wc-expl">${q.explanation}</div>
        </div>`;
      });
    }
    document.getElementById('wrongList').innerHTML = wHtml;

    // Actions
    let aHtml = '';
    if(wrong.length) {
      aHtml += `<button class="action-btn orange" onclick="app.retryWrong()">↻ Fehler wiederholen (${wrong.length})</button>`;
    }
    aHtml += `<button class="action-btn secondary" onclick="app.reset()">⌂ Zum Start</button>`;
    document.getElementById('resActions').innerHTML = aHtml;

    // Reset ring for next time
    ring.style.strokeDashoffset = circumference;

    this.show('result');
    setTimeout(() => ring.style.strokeDashoffset = offset, 50);
  },

  reset() {
    this.show('start');
    this.loadStats();
    document.getElementById('resRing').style.strokeDashoffset = 502.65;
  },

  show(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    window.scrollTo(0, 0);
  },

  shuffle(arr) {
    const a = [...arr];
    for(let i = a.length - 1; i > 0; i--){
      const j = Math.floor(Math.random() * (i + 1));
      [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
  },

  // ── Persistence ──
  loadStats() {
    try {
      const d = JSON.parse(localStorage.getItem('b1q_stats') || '{}');
      document.getElementById('statPlayed').textContent = d.played || 0;
      document.getElementById('statBest').textContent = d.best != null ? d.best + '%' : '–';
      document.getElementById('statStreak').textContent = d.streak || 0;
    } catch(e){}
  },
  saveStats(pct) {
    try {
      const d = JSON.parse(localStorage.getItem('b1q_stats') || '{}');
      d.played = (d.played || 0) + 1;
      d.best = d.best != null ? Math.max(d.best, pct) : pct;
      d.streak = pct >= 60 ? (d.streak || 0) + 1 : 0;
      localStorage.setItem('b1q_stats', JSON.stringify(d));
    } catch(e){}
  }
};

app.init();
</script>
</body>
</html>
